<script type="text/javascript">
var siteName = "Andhika's Content Library";
var subtext = "the most random in real life shenanigans";

function greetVisitor() {
	var name = document.getElementById("visitor-name").value;
	if (name == "") {
		document.getElementById("greeting-result").innerHTML = "you forgot to type your name lol";
	} else {
		document.getElementById("greeting-result").innerHTML = "hey " + name + ", welcome to my content library!!";
	}
	console.log("greeted visitor");
}

function toggleSurprise() {
	document.getElementById("surprise-text").style.display = "block";
	document.getElementById("surprise-text").style.fontSize = "12px";
	console.log("surprise text shown")
}

function openSurprise() {
	window.open("https://youtu.be/dQw4w9WgXcQ?si=788gVHDInHfzRz5F", "_blank");
