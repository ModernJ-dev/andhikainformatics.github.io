	<script type="text/javascript">
	// welcome page javascript - only for index
	var siteName = "Andhika's Content Library";
	var subtext = "the most random in real life shenanigans";
	var greeting = "";

	var hour = new Date().getHours();
	if (hour < 12) {
		greeting = "Good morning! ";
	} else if (hour < 18) {
		greeting = "Good afternoon! ";
	} else {
		greeting = "Good evening! ";
	}

	document.getElementById("welcome-title").innerHTML = siteName;
	document.getElementById("welcome-subtext").innerHTML = greeting + subtext;
	document.getElementById("welcome-subtext").style.fontSize = "16px";
	document.getElementById("welcome-subtext").style.color = "#315f52";

	document.title = siteName;

	console.log("welcome page loaded");

	function showSurpriseText() {
		document.getElementById("surprise-text").style.display = "block";
		console.log("surprise text shown");
	}

	function openRickroll() {
		var popup = document.createElement("div");
		popup.id = "rickroll-popup";
		popup.style.position = "fixed";
		popup.style.top = "0";
		popup.style.left = "0";
		popup.style.width = "100%";
		popup.style.height = "100%";
		popup.style.backgroundColor = "black";
		popup.style.zIndex = "9999";
		popup.style.textAlign = "center";
		popup.style.paddingTop = "50px";

		var closeBtn = document.createElement("button");
		closeBtn.innerHTML = "close";
		closeBtn.onclick = function() {
			document.body.removeChild(popup);
		};

		var video = document.createElement("video");
		video.src = "videos/rickroll.mp4";
		video.controls = true;
		video.autoplay = true;
		video.style.width = "600px";

		popup.appendChild(closeBtn);
		popup.appendChild(document.createElement("br"));
		popup.appendChild(video);
		document.body.appendChild(popup);

		console.log("rickroll popup opened");
	}
	</script>
